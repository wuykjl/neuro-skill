name: ci

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -e .
      - run: python -c "from neuro_skill import SkillRouter; print('import OK')"
      - run: python -c "from neuro_skill.base_features import BROAD, PRECISE; print(len(BROAD), 'broad +', len(PRECISE), 'precise')"
      - run: neuro-skill --help
